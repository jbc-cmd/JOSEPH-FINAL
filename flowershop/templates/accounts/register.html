{% extends 'base.html' %}

{% block title %}Register - Joseph Flowershop{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-12">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-3xl font-bold text-center mb-8">Create Your Account</h1>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">First Name</label>
                    <input type="text" name="first_name" class="w-full border border-gray-300 rounded px-4 py-2" placeholder="John">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Last Name</label>
                    <input type="text" name="last_name" class="w-full border border-gray-300 rounded px-4 py-2" placeholder="Doe">
                </div>
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">Username</label>
                <input type="text" name="username" required class="w-full border border-gray-300 rounded px-4 py-2" placeholder="Your username">
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">Email</label>
                <input type="email" name="email" required class="w-full border border-gray-300 rounded px-4 py-2" placeholder="your@email.com">
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">Phone Number</label>
                <input type="tel" name="phone_number" class="w-full border border-gray-300 rounded px-4 py-2" placeholder="+63 9123 456 789">
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">Password</label>
                <input type="password" name="password1" required class="w-full border border-gray-300 rounded px-4 py-2" placeholder="Create a strong password">
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">Confirm Password</label>
                <input type="password" name="password2" required class="w-full border border-gray-300 rounded px-4 py-2" placeholder="Confirm your password">
            </div>
            
            <button type="submit" class="w-full bg-pink-600 text-white py-3 rounded-lg font-bold hover:bg-pink-700">
                Create Account
            </button>
        </form>
        
        <p class="text-center mt-6">Already have an account? <a href="{% url 'accounts:login' %}" class="text-pink-600 font-bold hover:text-pink-700">Login here</a></p>
    </div>
</div>
{% endblock %}
