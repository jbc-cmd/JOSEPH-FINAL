{% extends 'base.html' %}

{% block title %}Login - Joseph Flowershop{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-12">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-3xl font-bold text-center mb-8">Login to Your Account</h1>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">Username</label>
                <input type="text" name="username" required class="w-full border border-gray-300 rounded px-4 py-2" placeholder="Enter your username">
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">Password</label>
                <input type="password" name="password" required class="w-full border border-gray-300 rounded px-4 py-2" placeholder="Enter your password">
            </div>
            
            <button type="submit" class="w-full bg-pink-600 text-white py-3 rounded-lg font-bold hover:bg-pink-700">
                Login
            </button>
        </form>
        
        <p class="text-center mt-6">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-pink-600 font-bold hover:text-pink-700">Register here</a></p>
    </div>
</div>
{% endblock %}
