{% extends "admin_dashboard/base.html" %}

{% block admin_content %}
<section class="panel form-panel">
    <div class="panel-head">
        <div>
            <p class="admin-eyebrow">Product Management</p>
            <h3>{% if mode == 'create' %}Add new product{% else %}Edit {{ product.name }}{% endif %}</h3>
        </div>
    </div>
    <form method="post" enctype="multipart/form-data" class="stack-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="action-row">
            <button type="submit">{% if mode == 'create' %}Create Product{% else %}Save Changes{% endif %}</button>
            <a href="{% url 'admin_dashboard:products' %}" class="button-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
